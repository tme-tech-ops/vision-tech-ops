# Changelog for vision-tech-ops
1.0.0.1:
  - ticket: vision-tech-ops-plan
    developer: R. Meyer
    description: |
      Fix prepare_passwd.py to hash the VM password with bcrypt instead of the
      stdlib `crypt` module (removed in Python 3.13; the deployment agent runs
      3.14). Matches the reference edge-cloudinit-linux approach. Found during
      Gw5200 smoke test (install failed at prepare_config: "No module named
      'crypt'").

1.0.0.0:
  - ticket: vision-tech-ops-plan
    developer: R. Meyer
    description: |
      Initial single-deployment blueprint. Provisions an Ubuntu 24.04
      cloud-image VM on a NativeEdge Endpoint (VM half ported from
      infra-dev-apps/vm) and deploys the object_detector_web application
      via its deploy.sh installer (app half modeled on object-tech-ops /
      registry-tech-ops). USB passthrough enabled by default with a live
      hardware-populated device picker; RTSP fallback input provided.
      Fixed a SyntaxError (missing commas) in the ported get_target_id.py.
