tosca_definitions_version: dell_1_1

description: >
  Single-deployment blueprint that provisions an Ubuntu 24.04 cloud-image
  Virtual Machine on a NativeEdge (DDPC) Endpoint and deploys the
  object_detector_web application onto it. The VM and the application are
  created together in one deployment. USB device passthrough is enabled by
  default so a USB camera connected to the Endpoint can be streamed by the
  app; an RTSP fallback is provided for cameras that do not stream over
  hypervisor USB passthrough.

imports:
  - dell/types/types.yaml
  - vm/definitions.yaml
  - vm/inputs.yaml
  - vm/outputs.yaml
  - app/definitions.yaml
  - app/inputs.yaml
  - app/outputs.yaml

input_groups:

  artifacts:
    display_label: Deployment Artifacts
    collapsible: true
    index: 0
    inputs:
      - os_image_secret

  vm:
    display_label: NativeEdge Virtual Machine
    collapsible: true
    index: 1
    inputs:
      - vm_hostname
      - vm_user_name
      - vm_password
      - vcpus
      - memory_size
      - os_disk_size
      - disk_wrapper

  device_passthrough:
    display_label: Device Passthrough (USB Camera)
    collapsible: true
    index: 2
    inputs:
      - use_passthrough
      - usb
      - serial_port_wrapper
      - gpu
      - video
      - pcie

  network:
    display_label: Network Configuration
    collapsible: true
    index: 3
    inputs:
      - vnic_0_segment_name
      - use_dhcp
      - static_ip
      - use_gateway
      - gateway
      - use_dns
      - dns
      - add_second_nic
      - vnic_1_segment_name
      - use_dhcp2
      - static_ip2
      - use_dns2
      - dns2

  application:
    display_label: Application Source
    collapsible: true
    index: 4
    inputs:
      - repo_url
      - repo_branch

  azure:
    display_label: Azure AI Vision
    collapsible: true
    index: 5
    inputs:
      - azure_vision_key
      - azure_vision_endpoint
      - azure_api_version
      - azure_monthly_budget
      - azure_budget_mode

  web:
    display_label: Web Server & Access
    collapsible: true
    index: 6
    inputs:
      - admin_user
      - admin_password
      - auth_mode
      - tls_mode
      - web_port

  camera:
    display_label: Camera (RTSP Fallback)
    collapsible: true
    index: 7
    inputs:
      - rtsp_url

  detection:
    display_label: Detection Features
    collapsible: true
    index: 8
    inputs:
      - feature_objects
      - feature_caption
      - feature_ocr
      - feature_people
      - confidence
      - draw_boxes

  logging:
    display_label: Logging
    collapsible: true
    index: 9
    inputs:
      - hide_log_output

labels:
  csys-obj-type:
    values:
      - environment
  target_environment:
    values:
      - ned
  vendor:
    values:
      - tme-tech-ops
  solution:
    values:
      - vision-tech-ops
  version:
    values:
      - "1.0.0.0"

blueprint_labels:
  env:
    values:
      - NED
